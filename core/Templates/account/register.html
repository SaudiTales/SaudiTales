<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="Saudi, heritage, landmarks, culture, history, image recognition">
    <meta name="description"
        content="Discover the rich heritage and landmarks of Saudi Arabia through our interactive website.">
    <title>register</title>
    <link rel="icon" href="{% static 'frontend/Images/web-icon.png' %}">
    <!-- bootstrap: -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- CSS: -->
    <link rel="stylesheet" href="{% static 'frontend/css/style.css' %}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Trirong">
</head>

<body>
    <div class="reg-container">
        <div class="row w-100 m-0">
            <div class="col-6 d-none d-sm-block"> <!-- picture side -->
                <div class="reg-img slide-left">
                    <img src="{% static 'frontend/Images/Register.jpg' %}" alt="Register Image" class="fluid">
                </div>
            </div>
            <div class="col-12 col-sm-6 d-flex justify-content-center align-items-center"> <!-- form side -->
                <div class="form-container text-center justify-content-center slide-right">
                    <h1>Welcome To Saudi Tales &hearts;</h1>
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-warning">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                    <form method="post">
                        {% csrf_token %}
                        <input type="text" name="first_name" placeholder="Enter your name" required>
                        <input type="text" name="username" placeholder="Enter username" required>
                        <input type="email" name="email" placeholder="Enter your email" required>
                        <input type="password" name="password" placeholder="Enter password" required>
                        <button class="register-btn" type="submit">Sign Up</button>
                        <a href="/login/">Already have an account? login</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
