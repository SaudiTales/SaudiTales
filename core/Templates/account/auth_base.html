<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Account{% endblock %}</title>

    <link rel="icon" href="{% static 'frontend/Images/web-icon.png' %}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet" href="{% static 'frontend/css/style.css' %}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Trirong">
</head>

<body>

<div class="reg-container">
    <div class="row w-100 m-0">

        <div class="col-6 d-none d-sm-block">
            <div class="reg-img slide-left">
                <img src="{% static 'frontend/Images/Register.jpg' %}" alt="Image" class="fluid">
            </div>
        </div>

        <!-- here is the form -->
        <div class="col-12 col-sm-6 d-flex justify-content-center align-items-center">
            <div class="form-container text-center justify-content-center slide-right">

                {% block content %}{% endblock %}

            </div>
        </div>

    </div>
</div>

</body>
</html>
