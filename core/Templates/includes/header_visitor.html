{% load static %}
<header>
    <nav class="navbar navbar-expand-lg slide-down">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <!-- left: menu, mood, language -->
            <div class="nav-left d-flex align-items-center gap-3">
                <!-- menu btn -->
                <button class="btn menu-btn" data-bs-toggle="offcanvas" data-bs-target="#navbarMenu">
                    <i class="bi bi-list"></i>
                </button>
                <!-- mod btn -->
                <button class="mod-btn" id="theme-toggle">
                    <i class="bi bi-brightness-high-fill"></i>
                </button>
                <!-- language btn -->
                {% comment %} <button class="lang-btn">
                    <span>ع</span>
                </button> {% endcomment %}
            </div>
            <!-- right: logo, sign up btn -->
            <div class="d-flex align-items-center gap-3">
                <a href="/register/">
                    <button class="btn-signup">Sign Up</button>
                </a>
                <a href="/">
                    <img src="{% static 'frontend/Images/Logo.png' %}" alt="logo" width="100px" height="100px">
                </a>
            </div>
        </div>
    </nav>
</header>
<!-- offcanvas menu -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="navbarMenu">
    <div class="offcanvas-header">
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <hr style="color: #F6F1E7;">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" href="/"><i class="bi bi-house-door-fill"></i> Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/explore/"><i class="bi bi-search"></i> Explore</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{% url 'home' %}#about" ><i class="bi bi-exclamation-circle-fill"></i> About</a>
            </li>
        </ul>
        <a href="/register/">
            <button class="menu-signup">Sign Up</button>
        </a>
    </div>
</div>
